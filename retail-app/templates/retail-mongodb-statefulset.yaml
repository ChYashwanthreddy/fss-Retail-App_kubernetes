apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.names.statefulset }}
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ .Values.names.mongodbService }}
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.labels.mongodb }}
  template:
    metadata:
      labels:
        app: {{ .Values.labels.mongodb }}
    spec:
      containers:
      - name: {{ .Values.statefulset.containerName }}
        image: "{{ .Values.image.mongodb.repository }}:{{ .Values.image.mongodb.tag }}"
        ports:
        - containerPort: {{ .Values.statefulset.port }}
        volumeMounts:
        - mountPath: /data/db
          name: mongo-data
        env:
        - name: MONGO_INITDB_DATABASE
          value: "{{ .Values.config.MONGO_INITDB_DATABASE }}"
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.names.storageClass }}
      resources:
        requests:
          storage: {{ .Values.statefulset.storageSize }}