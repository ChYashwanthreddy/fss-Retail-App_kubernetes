apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.deployment.labels.app }}
  template:
    metadata:
      labels:
        app: {{ .Values.deployment.labels.app }}
    spec:
      containers:
      - name: {{ .Values.deployment.name }}
        image: "{{ .Values.image.retail.repository }}:{{ .Values.image.retail.tag }}"
        ports:
        - containerPort: {{ .Values.deployment.port }}
        env:
        - name: MONGODB_URI
          value: "{{ .Values.config.MONGODB_URI }}"
        - name: SESSION_SECRET
          value: "{{ .Values.config.SESSION_SECRET }}"
        - name: PORT
          value: "{{ .Values.config.PORT }}"
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: EMAIL_USER
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: EMAIL_PASS