apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-app-config
  namespace: {{ .Values.namespace }}
data:
  MONGODB_URI: "{{ .Values.config.MONGODB_URI }}"
  SESSION_SECRET: "{{ .Values.config.SESSION_SECRET }}"
  PORT: "{{ .Values.config.PORT }}"
  MONGO_INITDB_DATABASE: "{{ .Values.mongodb.database }}"