apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.names.configmap }}
  namespace: {{ .Values.namespace }}
data:
  MONGODB_URI: "{{ .Values.config.MONGODB_URI }}"
  SESSION_SECRET: "{{ .Values.config.SESSION_SECRET }}"
  PORT: "{{ .Values.config.PORT }}"
  MONGO_INITDB_DATABASE: "{{ .Values.config.MONGO_INITDB_DATABASE }}"